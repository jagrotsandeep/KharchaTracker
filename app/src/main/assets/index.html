<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Kharcha Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; padding-bottom:70px; }

/* HEADER */
.header {
  background:#1a2035; padding:16px 20px;
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; z-index:100;
}
.header-title { font-size:22px; font-weight:800; color:#fff; }
.header-title span { color:#00d4ff; }
.header-sub { font-size:12px; color:#8892a4; }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:#fff; display:flex;
  box-shadow:0 -2px 12px rgba(0,0,0,0.1);
  z-index:100; height:60px;
}
.nav-btn {
  flex:1; border:none; background:transparent;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  font-size:11px; color:#8892a4; cursor:pointer; gap:3px;
}
.nav-btn .nav-icon { font-size:20px; }
.nav-btn.active { color:#1a2035; font-weight:700; }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* CARDS */
.cards-wrap { padding:16px; display:flex; flex-direction:column; gap:12px; }
.balance-card {
  background:#162447; border-radius:16px; padding:24px 20px;
}
.card-icon { font-size:28px; margin-bottom:8px; }
.card-label {
  font-size:11px; font-weight:700; letter-spacing:1.5px;
  text-transform:uppercase; margin-bottom:8px;
}
.balance-card .card-label { color:#8892a4; }
.balance-amount { font-size:36px; font-weight:800; color:#fff; }

.income-card {
  background:#e8f5e9; border-radius:16px;
  padding:20px; border:1px solid #c8e6c9; flex:1;
}
.income-card .card-label { color:#388e3c; }
.income-card .amount { font-size:26px; font-weight:800; color:#2e7d32; }

.expense-card {
  background:#fce4ec; border-radius:16px;
  padding:20px; border:1px solid #f8bbd0; flex:1;
}
.expense-card .card-label { color:#c62828; }
.expense-card .amount { font-size:26px; font-weight:800; color:#c62828; }

/* SECTION CARD */
.section-card {
  background:#fff; border-radius:16px;
  padding:20px; margin:0 16px 12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.section-title {
  font-size:11px; font-weight:800; letter-spacing:1.5px;
  color:#1a2035; text-transform:uppercase; margin-bottom:12px;
}
.divider { height:1px; background:#f0f0f0; margin-bottom:14px; }

/* METER */
.meter-row { display:flex; justify-content:space-between; margin-bottom:8px; }
.meter-label { font-size:14px; color:#555; }
.meter-pct { font-size:16px; font-weight:800; color:#1a2035; }
.progress-bar { height:10px; background:#e0e0e0; border-radius:10px; overflow:hidden; margin-bottom:10px; }
.progress-fill { height:100%; border-radius:10px; transition:width 0.5s; }
.meter-status { font-size:13px; color:#555; }

/* FORM */
.form-group { margin-bottom:14px; }
.form-group label { font-size:13px; font-weight:600; color:#333; display:block; margin-bottom:6px; }
.form-input {
  width:100%; padding:12px 14px;
  border:1.5px solid #e0e0e0; border-radius:10px;
  font-size:14px; color:#333; outline:none;
  background:#fafafa; transition:border-color 0.2s;
}
.form-input:focus { border-color:#1a2035; background:#fff; }
select.form-input { appearance:none; -webkit-appearance:none; }
.form-row { display:flex; gap:10px; }
.form-row .form-group { flex:1; }

/* TOGGLE BUTTONS */
.toggle-row { display:flex; gap:10px; }
.tog-btn {
  flex:1; padding:12px; border:2px solid #e0e0e0;
  border-radius:10px; background:#fff;
  font-size:13px; font-weight:600; color:#666; cursor:pointer;
}
.tog-btn.income.active  { border-color:#2e7d32; background:#e8f5e9; color:#2e7d32; }
.tog-btn.expense.active { border-color:#c62828; background:#fce4ec; color:#c62828; }
.tog-btn.pay.active     { border-color:#1a2035; background:#e8eaf6; color:#1a2035; }

.add-btn {
  width:100%; padding:14px; background:#1a2035;
  border:none; border-radius:10px; color:#fff;
  font-size:15px; font-weight:700; cursor:pointer; margin-top:6px;
}

/* TRANSACTION ITEM */
.txn-list { display:flex; flex-direction:column; gap:10px; }
.txn-item {
  display:flex; align-items:center; gap:12px;
  padding:14px 12px; border-radius:12px;
  background:#fff; border:1px solid #f0f0f0;
  border-left:4px solid #ccc;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  position:relative;
}
.txn-item.income  { border-left-color:#22c55e; }
.txn-item.expense { border-left-color:#ef4444; }

.txn-emoji {
  width:44px; height:44px; background:#f5f5f5;
  border-radius:10px; display:flex;
  align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.txn-info { flex:1; min-width:0; }
.txn-name { font-size:15px; font-weight:700; color:#1a2035; }
.txn-meta { font-size:12px; color:#8892a4; margin-top:2px; }

.pay-badge {
  display:inline-block; font-size:10px; font-weight:700;
  padding:2px 6px; border-radius:5px; margin-left:4px;
}
.pay-badge.cash   { background:#fff3e0; color:#e65100; }
.pay-badge.online { background:#e3f2fd; color:#1565c0; }

.txn-amount { font-size:15px; font-weight:800; flex-shrink:0; }
.txn-amount.income  { color:#22c55e; }
.txn-amount.expense { color:#ef4444; }

/* 3 DOTS MENU */
.dots-btn {
  width:32px; height:32px; border:none;
  background:transparent; font-size:20px;
  color:#bbb; cursor:pointer; flex-shrink:0;
  border-radius:8px; display:flex;
  align-items:center; justify-content:center;
  font-weight:700; letter-spacing:1px;
}
.dots-btn:active { background:#f0f0f0; }

.dot-menu {
  position:absolute; right:8px; top:52px;
  background:#fff; border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
  z-index:50; display:none;
  min-width:130px; border:1px solid #f0f0f0;
  overflow:hidden;
}
.dot-menu.open { display:block; }
.dot-item {
  display:flex; align-items:center; gap:10px;
  padding:13px 16px; cursor:pointer;
  font-size:14px; font-weight:600;
}
.dot-item:active { background:#f5f5f5; }
.dot-item.edit { color:#1a2035; }
.dot-item.del  { color:#ef4444; }

/* HISTORY TOP BAR */
.hist-header {
  display:flex; justify-content:space-between;
  align-items:center; margin-bottom:12px;
}
.clear-btn {
  padding:6px 12px; border:1.5px solid #ddd;
  border-radius:8px; background:#fff;
  font-size:12px; color:#666; cursor:pointer;
}

/* CHIPS */
.chips { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.chip {
  padding:7px 14px; border-radius:20px;
  border:1.5px solid #e0e0e0; background:#fff;
  font-size:12px; font-weight:600; color:#666; cursor:pointer;
}
.chip.active { background:#1a2035; color:#fff; border-color:#1a2035; }

/* EDIT MODAL */
.modal-bg {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.5);
  z-index:200; display:none; align-items:flex-end;
}
.modal-bg.open { display:flex; }
.modal-box {
  background:#fff; width:100%;
  border-radius:20px 20px 0 0;
  padding:24px 20px 40px;
  max-height:85vh; overflow-y:auto;
}
.modal-head {
  display:flex; justify-content:space-between;
  align-items:center; margin-bottom:16px;
  font-size:16px; font-weight:800; color:#1a2035;
}
.modal-close {
  width:30px; height:30px; border:none;
  background:#f0f0f0; border-radius:50%;
  font-size:16px; cursor:pointer; color:#666;
}
.save-btn {
  width:100%; padding:14px; background:#1a2035;
  border:none; border-radius:10px; color:#fff;
  font-size:15px; font-weight:700; cursor:pointer; margin-top:8px;
}

/* EMPTY */
.empty { text-align:center; padding:30px 20px; color:#bbb; }
.empty-ic { font-size:40px; margin-bottom:10px; }
.empty-tx { font-size:13px; }

/* FOOTER */
.footer-credit {
  text-align:center; padding:16px;
  color:#8892a4; font-size:12px;
  border-top:1px solid #e8e8e8;
  margin:4px 16px 0;
}
.footer-credit strong { color:#1a2035; }
.footer-credit span   { color:#00d4ff; }

#hist-page { padding:16px; }
#hist-page .section-card { margin:0; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">Kharcha <span>Tracker</span></div>
  <div class="header-sub">by CodeKaroBhai</div>
</div>

<!-- ═══════════ HOME PAGE ═══════════ -->
<div id="home-page" class="page active">

  <!-- Summary Cards -->
  <div class="cards-wrap">
    <div class="balance-card">
      <div class="card-icon">💼</div>
      <div class="card-label">Net Balance</div>
      <div class="balance-amount" id="net-bal">₹0</div>
    </div>
    <div style="display:flex;gap:12px">
      <div class="income-card">
        <div class="card-icon">📈</div>
        <div class="card-label">Total Income</div>
        <div class="amount" id="tot-inc">₹0</div>
      </div>
      <div class="expense-card">
        <div class="card-icon">📉</div>
        <div class="card-label">Total Expense</div>
        <div class="amount" id="tot-exp">₹0</div>
      </div>
    </div>
  </div>

  <!-- Spending Meter -->
  <div class="section-card">
    <div class="section-title">Spending Meter</div>
    <div class="divider"></div>
    <div class="meter-row">
      <span class="meter-label">Expense / Income</span>
      <span class="meter-pct" id="spend-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="prog" style="width:0%;background:#22c55e"></div>
    </div>
    <div class="meter-status" id="meter-msg">😊 Pehle kuch add karo!</div>
  </div>

  <!-- Add Transaction Form -->
  <div class="section-card">
    <div class="section-title">Add Transaction</div>
    <div class="divider"></div>

    <!-- Name -->
    <div class="form-group">
      <label>Transaction Name</label>
      <input class="form-input" id="f-name" type="text"
        placeholder="e.g. Maggi, Salary, Recharge...">
    </div>

    <!-- Amount + Category -->
    <div class="form-row">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input class="form-input" id="f-amt" type="number" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select class="form-input" id="f-cat">
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Bills">💡 Bills</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Education">📚 Education</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">💰 Other</option>
        </select>
      </div>
    </div>

    <!-- Date — default today -->
    <div class="form-group">
      <label>Date</label>
      <input class="form-input" id="f-date" type="date">
    </div>

    <!-- Type -->
    <div class="form-group">
      <label>Type</label>
      <div class="toggle-row">
        <button class="tog-btn income active" id="b-inc"
          onclick="setType('income')">📈 Income</button>
        <button class="tog-btn expense" id="b-exp"
          onclick="setType('expense')">📉 Expense</button>
      </div>
    </div>

    <!-- Payment -->
    <div class="form-group">
      <label>Payment Method</label>
      <div class="toggle-row">
        <button class="tog-btn pay active" id="b-cash"
          onclick="setPay('cash')">💵 Cash</button>
        <button class="tog-btn pay" id="b-online"
          onclick="setPay('online')">📱 Online</button>
      </div>
    </div>

    <button class="add-btn" onclick="addTxn()">+ Add Transaction</button>
  </div>

  <!-- Footer Credit -->
  <div class="footer-credit">
    Made with ❤️ by <strong>Sandeep Kumar</strong><br>
    <span>BCA Student</span> · 2026
  </div>
</div>

<!-- ═══════════ HISTORY PAGE ═══════════ -->
<div id="hist-page" class="page">
  <div class="section-card">
    <div class="hist-header">
      <div class="section-title">Transaction History</div>
      <button class="clear-btn" onclick="clearAll()">Clear All</button>
    </div>
    <div class="divider"></div>
    <div class="chips">
      <div class="chip active" onclick="setFilt('all',this)">All</div>
      <div class="chip" onclick="setFilt('income',this)">Income</div>
      <div class="chip" onclick="setFilt('expense',this)">Expense</div>
      <div class="chip" onclick="setFilt('cash',this)">💵 Cash</div>
      <div class="chip" onclick="setFilt('online',this)">📱 Online</div>
    </div>
    <div class="txn-list" id="hist-list"></div>
  </div>
</div>

<!-- ═══════════ EDIT MODAL ═══════════ -->
<div class="modal-bg" id="edit-modal">
  <div class="modal-box">
    <div class="modal-head">
      ✏️ Edit Transaction
      <button class="modal-close" onclick="closeEdit()">✕</button>
    </div>
    <input type="hidden" id="e-id">
    <div class="form-group">
      <label>Transaction Name</label>
      <input class="form-input" id="e-name" type="text">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input class="form-input" id="e-amt" type="number">
      </div>
      <div class="form-group">
        <label>Category</label>
        <select class="form-input" id="e-cat">
          <option value="Food">🍜 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Bills">💡 Bills</option>
          <option value="Shopping">🛒 Shopping</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Education">📚 Education</option>
          <option value="Salary">💼 Salary</option>
          <option value="Other">💰 Other</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input class="form-input" id="e-date" type="date">
    </div>
    <div class="form-group">
      <label>Type</label>
      <div class="toggle-row">
        <button class="tog-btn income" id="eb-inc" onclick="setEType('income')">📈 Income</button>
        <button class="tog-btn expense" id="eb-exp" onclick="setEType('expense')">📉 Expense</button>
      </div>
    </div>
    <div class="form-group">
      <label>Payment</label>
      <div class="toggle-row">
        <button class="tog-btn pay" id="eb-cash" onclick="setEPay('cash')">💵 Cash</button>
        <button class="tog-btn pay" id="eb-online" onclick="setEPay('online')">📱 Online</button>
      </div>
    </div>
    <button class="save-btn" onclick="saveEdit()">💾 Save Changes</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goPage('home')">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-btn" id="nav-hist" onclick="goPage('hist')">
    <span class="nav-icon">📋</span>History
  </button>
</div>

<script>
const EMOJI = {Food:'🍜',Transport:'🚗',Bills:'💡',Shopping:'🛒',Entertainment:'🎮',Education:'📚',Salary:'💼',Other:'💰'};

let txns    = JSON.parse(localStorage.getItem('kxt')||'[]');
let cType   = 'income';
let cPay    = 'cash';
let cFilt   = 'all';
let eType   = 'income';
let ePay    = 'cash';
let openId  = null;

// Set today as default date
function today(){ return new Date().toISOString().split('T')[0]; }
document.getElementById('f-date').value = today();

function save(){ localStorage.setItem('kxt', JSON.stringify(txns)); }

function fmt(n){ return '₹'+Number(n).toLocaleString('en-IN'); }

function fmtDate(s){
  if(!s) return '';
  const d = new Date(s+'T00:00:00');
  return d.getDate()+' '+d.toLocaleString('default',{month:'short'})+' '+d.getFullYear();
}

function setType(t){
  cType=t;
  document.getElementById('b-inc').classList.toggle('active',t==='income');
  document.getElementById('b-exp').classList.toggle('active',t==='expense');
}
function setPay(p){
  cPay=p;
  document.getElementById('b-cash').classList.toggle('active',p==='cash');
  document.getElementById('b-online').classList.toggle('active',p==='online');
}
function setEType(t){
  eType=t;
  document.getElementById('eb-inc').classList.toggle('active',t==='income');
  document.getElementById('eb-exp').classList.toggle('active',t==='expense');
}
function setEPay(p){
  ePay=p;
  document.getElementById('eb-cash').classList.toggle('active',p==='cash');
  document.getElementById('eb-online').classList.toggle('active',p==='online');
}

function goPage(p){
  document.getElementById('home-page').classList.toggle('active',p==='home');
  document.getElementById('hist-page').classList.toggle('active',p==='hist');
  document.getElementById('nav-home').classList.toggle('active',p==='home');
  document.getElementById('nav-hist').classList.toggle('active',p==='hist');
  closeMenus(); renderAll();
}

function setFilt(f,el){
  cFilt=f;
  document.querySelectorAll('#hist-page .chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderHist();
}

function addTxn(){
  const name = document.getElementById('f-name').value.trim();
  const amt  = parseFloat(document.getElementById('f-amt').value);
  const cat  = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value || today();
  if(!name){alert('Transaction name daalo!');return;}
  if(!amt||amt<=0){alert('Sahi amount daalo!');return;}
  txns.unshift({id:Date.now(),name,amt,cat,date,type:cType,pay:cPay});
  save();
  document.getElementById('f-name').value='';
  document.getElementById('f-amt').value='';
  document.getElementById('f-date').value=today();
  renderAll();
}

/* ── 3 dots menu ── */
function toggleMenu(id){
  if(openId && openId!==id) closeMenus();
  const m = document.getElementById('dm-'+id);
  if(!m) return;
  const was = m.classList.contains('open');
  closeMenus();
  if(!was){ m.classList.add('open'); openId=id; }
}
function closeMenus(){
  document.querySelectorAll('.dot-menu').forEach(m=>m.classList.remove('open'));
  openId=null;
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dots-btn')&&!e.target.closest('.dot-menu')) closeMenus();
});

/* ── Edit ── */
function openEdit(id){
  closeMenus();
  const t = txns.find(x=>x.id===id);
  if(!t) return;
  document.getElementById('e-id').value   = id;
  document.getElementById('e-name').value = t.name;
  document.getElementById('e-amt').value  = t.amt;
  document.getElementById('e-cat').value  = t.cat;
  document.getElementById('e-date').value = t.date||today();
  eType=t.type; ePay=t.pay||'cash';
  setEType(eType); setEPay(ePay);
  document.getElementById('edit-modal').classList.add('open');
}
function closeEdit(){
  document.getElementById('edit-modal').classList.remove('open');
}
function saveEdit(){
  const id   = parseInt(document.getElementById('e-id').value);
  const name = document.getElementById('e-name').value.trim();
  const amt  = parseFloat(document.getElementById('e-amt').value);
  const cat  = document.getElementById('e-cat').value;
  const date = document.getElementById('e-date').value;
  if(!name){alert('Name daalo!');return;}
  if(!amt||amt<=0){alert('Sahi amount!');return;}
  const i = txns.findIndex(x=>x.id===id);
  if(i!==-1){
    txns[i]={id,name,amt,cat,date,type:eType,pay:ePay};
    save(); closeEdit(); renderAll();
  }
}

/* ── Delete ── */
function delTxn(id){
  closeMenus();
  if(confirm('Delete karein?')){
    txns=txns.filter(x=>x.id!==id);
    save(); renderAll();
  }
}
function clearAll(){
  if(confirm('Saari transactions delete karein?')){txns=[];save();renderAll();}
}

/* ── Render ── */
function renderSummary(){
  const inc = txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amt,0);
  const exp = txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amt,0);
  const net = inc-exp;
  const pct = inc>0?Math.min(Math.round(exp/inc*100),100):0;
  document.getElementById('net-bal').textContent = fmt(net);
  document.getElementById('tot-inc').textContent = fmt(inc);
  document.getElementById('tot-exp').textContent = fmt(exp);
  document.getElementById('spend-pct').textContent = pct+'%';
  const p = document.getElementById('prog');
  p.style.width      = pct+'%';
  p.style.background = pct<50?'#22c55e':pct<80?'#f59e0b':'#ef4444';
  let msg='😊 Pehle kuch add karo!';
  if(txns.length>0){
    if(pct===0)      msg='💰 Koi kharcha nahi!';
    else if(pct<50)  msg='✅ Bahut badhiya savings!';
    else if(pct<80)  msg='👍 Theek hai, thoda aur bachao!';
    else if(pct<100) msg='⚠️ Zyada kharcha ho raha hai!';
    else             msg='🚨 Income se zyada kharcha!';
  }
  document.getElementById('meter-msg').textContent=msg;
}

function txnCard(t){
  const em  = EMOJI[t.cat]||'💰';
  const sgn = t.type==='expense'?'-':'+';
  const pb  = t.pay?`<span class="pay-badge ${t.pay}">${t.pay==='cash'?'💵 Cash':'📱 Online'}</span>`:'';
  return `
  <div class="txn-item ${t.type}">
    <div class="txn-emoji">${em}</div>
    <div class="txn-info">
      <div class="txn-name">${t.name}</div>
      <div class="txn-meta">${t.cat} · ${fmtDate(t.date)} ${pb}</div>
    </div>
    <div class="txn-amount ${t.type}">${sgn}${fmt(t.amt)}</div>
    <button class="dots-btn" onclick="toggleMenu(${t.id})">⋮</button>
    <div class="dot-menu" id="dm-${t.id}">
      <div class="dot-item edit" onclick="openEdit(${t.id})">✏️ &nbsp;Edit</div>
      <div class="dot-item del"  onclick="delTxn(${t.id})">🗑️ &nbsp;Delete</div>
    </div>
  </div>`;
}

function renderHist(){
  const list = txns.filter(t=>{
    if(cFilt==='all')     return true;
    if(cFilt==='income')  return t.type==='income';
    if(cFilt==='expense') return t.type==='expense';
    if(cFilt==='cash')    return t.pay==='cash';
    if(cFilt==='online')  return t.pay==='online';
    return true;
  });
  const el = document.getElementById('hist-list');
  el.innerHTML = list.length===0
    ? `<div class="empty"><div class="empty-ic">📋</div><div class="empty-tx">Koi transaction nahi.<br>Home se add karo! 😊</div></div>`
    : list.map(txnCard).join('');
}

function renderAll(){ renderSummary(); renderHist(); }
renderAll();
</script>
</body>
</html>
